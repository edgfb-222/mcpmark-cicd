name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Create required labels if missing
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              // Category Labels
              { name: 'bug', color: 'd73a4a', description: 'Something isn't working' },
              { name: 'enhancement', color: 'a2eeef', description: 'New feature or request' },
              { name: 'epic', color: '0052cc', description: 'Large feature requiring multiple sub-tasks' },
              { name: 'maintenance', color: 'fef2c0', description: 'Maintenance and housekeeping tasks' },
              // Priority Labels
              { name: 'priority-critical', color: 'b60205', description: 'Critical priority issue' },
              { name: 'priority-high', color: 'd93f0b', description: 'High priority issue' },
              { name: 'priority-medium', color: 'fbca04', description: 'Medium priority issue' },
              { name: 'priority-low', color: '0e8a16', description: 'Low priority issue' },
              // Status Labels
              { name: 'needs-triage', color: 'ffff00', description: 'Needs to be reviewed by maintainers' },
              { name: 'needs-review', color: '006b75', description: 'Awaiting review from maintainers' },
              { name: 'first-time-contributor', color: '1d76db', description: 'Issue created by first-time contributor' }
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });
                console.log(`Label ${label.name} already exists`);
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                  console.log(`Created label ${label.name}`);
                } else {
                  throw error;
                }
              }
            }

      - name: Triage issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = issue.body ? issue.body.toLowerCase() : '';
            const labelsToAdd = [];

            // Add initial needs-triage label
            labelsToAdd.push('needs-triage');

            // Assign category labels based on title
            if (title.includes('bug')) {
              labelsToAdd.push('bug');
            }
            if (title.includes('epic')) {
              labelsToAdd.push('epic');
            }
            if (title.includes('maintenance')) {
              labelsToAdd.push('maintenance');
            }

            // Assign priority labels (highest priority wins)
            const priorityRules = [
              { keywords: ['critical', 'urgent', 'production', 'outage'], label: 'priority-critical' },
              { keywords: ['important', 'high', 'blocking'], label: 'priority-high' },
              { keywords: ['medium', 'normal'], label: 'priority-medium' },
              { keywords: ['low', 'nice-to-have', 'minor'], label: 'priority-low' }
            ];

            let priorityLabel = 'priority-medium'; // Default priority
            for (const rule of priorityRules) {
              if (rule.keywords.some(keyword => title.includes(keyword) || body.includes(keyword))) {
                priorityLabel = rule.label;
                break; // Stop at first matching highest priority
              }
            }
            labelsToAdd.push(priorityLabel);

            // Add labels to the issue
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: labelsToAdd
            });

  task-breakdown:
    needs: issue-triage
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.issue.title, 'Epic') || contains(github.event.issue.title, 'epic') }}
    steps:
      - name: Create sub-issues for Epic
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const parentNumber = issue.number;
            const originalTitle = issue.title;
            const subTasks = [
              { name: 'Requirements Analysis' },
              { name: 'Design and Architecture' },
              { name: 'Implementation' },
              { name: 'Testing and Documentation' }
            ];

            const subIssueNumbers = [];

            // Create each sub-issue
            for (let i = 0; i < subTasks.length; i++) {
              const task = subTasks[i];
              const subTitle = `[SUBTASK] ${originalTitle} - Task ${i + 1}: ${task.name}`;
              const subBody = `Related to #${parentNumber}`;

              const subIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: subTitle,
                body: subBody,
                labels: ['enhancement', 'needs-review']
              });

              subIssueNumbers.push(subIssue.data.number);
              console.log(`Created sub-issue #${subIssue.data.number}: ${subTitle}`);
            }

            // Update parent issue with Epic Tasks checklist
            let updatedBody = issue.body || '';
            updatedBody += '\n\n## Epic Tasks\n';
            subIssueNumbers.forEach(num => {
              updatedBody += `- [ ] #${num}\n`;
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parentNumber,
              body: updatedBody
            });

  auto-response:
    needs: [issue-triage, task-breakdown]
    runs-on: ubuntu-latest
    steps:
      - name: Check if first issue in repository
        id: first-issue-check
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const author = issue.user.login;

            // Fetch all issues created by this author in the repo
            const { data: authorIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: author,
              state: 'all'
            });

            // Return true if this is their first issue (count === 1)
            return authorIssues.length === 1;
          result-encoding: string

      - name: Add first-time-contributor label
        if: ${{ steps.first-issue-check.outputs.result == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['first-time-contributor']
            });

      - name: Post type-specific response
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const issueLabels = issue.labels.map(label => label.name.toLowerCase());
            let commentContent = '';

            // Welcome message for first-time contributors
            if (${{ steps.first-issue-check.outputs.result == 'true' }}) {
              commentContent += '👋 Welcome to the repository! This is your first issue here—thank you for contributing!\n\n';
            }

            // Add guidelines based on issue type
            if (issueLabels.includes('bug')) {
              commentContent += '### Bug Report Guidelines\nPlease ensure your report includes:\n- Clear description of the bug\n- Step-by-step reproduction instructions\n- Expected vs actual behavior\n- Screenshots (if applicable)\n- Environment details (Node.js version, OS)\n';
            } else if (issueLabels.includes('epic')) {
              commentContent += '### Feature Request Process\nThis epic has been broken down into sub-tasks. Please review the linked sub-issues once they are created and provide feedback on requirements and scope.\n';
            } else if (issueLabels.includes('maintenance')) {
              commentContent += '### Maintenance Guidelines\nPlease ensure your maintenance task includes:\n- Clear scope of work\n- Impact analysis (what parts of the project are affected)\n- Testing plan (if applicable)\n';
            }

            // Post the comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: commentContent
            });

      - name: Set milestone for high/critical issues
        if: ${{ contains(github.event.issue.labels.*.name, 'priority-high') || contains(github.event.issue.labels.*.name, 'priority-critical') }}
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const milestoneTitle = 'v1.0.0';

            // Check if milestone exists
            let milestone;
            try {
              const { data: milestones } = await github.rest.issues.listMilestones({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open'
              });
              milestone = milestones.find(m => m.title === milestoneTitle);

              // Create milestone if not found
              if (!milestone) {
                const { data: newMilestone } = await github.rest.issues.createMilestone({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: milestoneTitle
                });
                milestone = newMilestone;
              }
            } catch (error) {
              console.error('Error handling milestone:', error);
              throw error;
            }

            // Assign milestone to issue
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              milestone: milestone.number
            });

      - name: Update status to needs-review
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;

            // Remove needs-triage label
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              name: 'needs-triage'
            });

            // Add needs-review label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['needs-review']
            });
